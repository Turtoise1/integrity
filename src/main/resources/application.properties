spring.application.name=Merkle-Trees
documents.folder=src/test/resources/public/

# File upload size limits
spring.servlet.multipart.max-file-size=100MB
spring.servlet.multipart.max-request-size=500MB

# Raft cluster configuration
raft.group.id="integrityGroup"
raft.storage.base=/tmp/ratis
raft.peers=n0:127.0.0.1:6000,n1:127.0.0.1:6001,n2:127.0.0.1:6002

# Logging levels for Raft
logging.level.org.apache.ratis=WARN
logging.level.org.apache.ratis.server=ERROR
